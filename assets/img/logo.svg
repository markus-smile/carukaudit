<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 84" role="img" aria-label="Caruk Audit">
  <title>Caruk Audit</title>
  <defs>
    <style>
      @font-face {
        font-family: 'FrauncesLogo';
        src: url('data:font/woff2;base64,') format('woff2');
        font-weight: normal;
        font-style: normal;
        font-display: block;
      }
    </style>
  </defs>

  <!-- Marka: celownik termowizyjny (thermal lens) -->
  <circle cx="18" cy="33" r="11" fill="none" stroke="#dba14e" stroke-width="1.4"/>
  <line x1="18" y1="20" x2="18" y2="15" stroke="#dba14e" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="18" y1="46" x2="18" y2="51" stroke="#dba14e" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="5" y1="33" x2="1" y2="33" stroke="#dba14e" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="31" y1="33" x2="36" y2="33" stroke="#dba14e" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="18" cy="33" r="2.2" fill="#dba14e"/>

  <!-- Wordmark -->
  <text x="43.00" y="52"
        font-family="'FrauncesLogo', Georgia, 'Times New Roman', serif"
        font-size="46" font-weight="normal"
        fill="#f4f1ea" letter-spacing="-0.8"
        text-rendering="optimizeLegibility">Caruk Audit</text>

  <!-- Linia bazowa — spina markę i wordmark -->
  <line x1="1.00" y1="57.50" x2="277.68" y2="57.50"
        stroke="#dba14e" stroke-width="1.4" stroke-linecap="round"/>
</svg>